<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勤務行事曆</title>
<style>
  :root{
    --navy:#16233F;
    --navy-2:#223257;
    --amber:#E8A33D;
    --amber-dim:#F3D9A8;
    --paper:#F5F6F8;
    --card:#FFFFFF;
    --ink:#26313F;
    --ink-dim:#6B7686;
    --line:#E2E5EA;
    --red:#D6503F;
    --green:#3E8E64;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    display:flex; flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .topbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.5px;}
  .topbar .sub{font-size:11px; color:var(--amber-dim); margin-top:2px;}
  .name-chip{
    background:var(--navy-2);
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
    font-size:12px;
    padding:6px 10px;
    border-radius:20px;
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
  }
  .name-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}

  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 6px;
  }
  .month-nav .label{font-size:19px; font-weight:700; color:var(--navy);}
  .month-nav .label .yr{font-size:12px; color:var(--ink-dim); font-weight:500; display:block;}
  .navbtn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--line);
    background:#fff; color:var(--navy); font-size:16px; display:flex;
    align-items:center; justify-content:center;
  }
  .navbtn:active{background:var(--paper);}

  .weekrow{display:grid; grid-template-columns:repeat(7,1fr); padding:4px 12px 0; }
  .weekrow div{text-align:center; font-size:11px; color:var(--ink-dim); padding:4px 0;}

  .grid{
    display:grid; grid-template-columns:repeat(7,1fr);
    gap:6px; padding:6px 12px 14px;
  }
  .cell{
    aspect-ratio:1/1.02;
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start;
    padding:6px 2px 4px;
    position:relative;
    font-size:13px;
  }
  .cell.empty{background:transparent; border:none;}
  .cell .num{font-weight:600;}
  .cell.today{border:2px solid var(--amber);}
  .cell.today .num{color:var(--amber); }
  .cell.weekend .num{color:var(--red);}
  .cell .bar{
    margin-top:4px; width:80%; display:flex; flex-direction:column; gap:2px;
  }
  .cell .tag{
    font-size:8.5px; background:var(--navy-2); color:#fff; border-radius:4px;
    padding:1px 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cell .more{font-size:8.5px; color:var(--ink-dim);}
  .cell .count-dot{
    position:absolute; top:5px; right:6px; width:6px; height:6px; border-radius:50%;
    background:var(--amber);
  }

  /* Sheet */
  .overlay{
    position:fixed; inset:0; background:rgba(15,20,30,.45);
    display:none; align-items:flex-end; z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--paper);
    width:100%; max-height:88vh; border-radius:20px 20px 0 0;
    display:flex; flex-direction:column;
    animation:slideup .22s ease-out;
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{
    padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); background:var(--card); border-radius:20px 20px 0 0;
  }
  .sheet-head h2{font-size:16px; margin:0; color:var(--navy);}
  .sheet-head .close{font-size:20px; color:var(--ink-dim); padding:4px 8px;}
  .sheet-body{overflow-y:auto; padding:12px 16px 100px; flex:1;}

  .timeline{
    position:relative; margin:6px 0 18px; height:26px; background:var(--card);
    border-radius:8px; border:1px solid var(--line); overflow:hidden;
  }
  .timeline .tick{
    position:absolute; top:0; bottom:0; width:1px; background:var(--line);
  }
  .timeline .block{
    position:absolute; top:2px; bottom:2px; border-radius:5px;
    background:var(--amber); opacity:.85; min-width:2px;
  }
  .timeline .hourlbl{
    display:flex; justify-content:space-between; font-size:9px; color:var(--ink-dim); margin-top:2px;
  }

  .entry{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px;
  }
  .entry .time{
    font-weight:700; color:var(--navy); font-size:13px; min-width:70px;
    font-variant-numeric:tabular-nums;
  }
  .entry .desc{flex:1; font-size:14px;}
  .entry .who{font-size:10px; color:var(--ink-dim); display:block; margin-top:2px;}
  .entry .del{color:var(--red); font-size:18px; padding:4px 6px;}
  .empty-hint{
    text-align:center; color:var(--ink-dim); font-size:13px; padding:20px 0;
  }

  .add-form{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px; margin-top:6px;
  }
  .add-form .row{display:flex; gap:8px; margin-bottom:8px;}
  .add-form label{font-size:11px; color:var(--ink-dim); display:block; margin-bottom:3px;}
  .add-form input[type=time], .add-form input[type=text]{
    width:100%; padding:8px 9px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; background:var(--paper); color:var(--ink); font-family:inherit;
  }
  .add-form .col{flex:1;}
  .add-btn{
    width:100%; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:11px; font-size:14px; font-weight:700; margin-top:4px;
  }
  .add-btn:active{background:var(--navy-2);}

  .fab-add{
    position:fixed; bottom:20px; right:20px; width:54px; height:54px; border-radius:50%;
    background:var(--amber); color:var(--navy); font-size:26px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.25); z-index:15; border:none;
  }
  .sync-note{
    text-align:center; font-size:10px; color:var(--ink-dim); padding:2px 0 10px;
  }
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:8px 16px; border-radius:20px;
    font-size:12px; z-index:99; opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .name-modal{
    position:fixed; inset:0; background:rgba(15,20,30,.5); display:none;
    align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .name-modal.show{display:flex;}
  .name-box{
    background:#fff; border-radius:16px; padding:20px; width:100%; max-width:320px;
  }
  .name-box h3{margin:0 0 4px; font-size:15px; color:var(--navy);}
  .name-box p{margin:0 0 12px; font-size:12px; color:var(--ink-dim);}
  .name-box input{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; margin-bottom:12px; font-family:inherit;
  }
  .name-box .save{
    width:100%; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:11px; font-size:14px; font-weight:700;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>勤務行事曆</h1>
    <div class="sub" id="teamNote">30 人共用・即時同步</div>
  </div>
  <div class="name-chip" id="nameChip"><span class="dot"></span><span id="nameChipText">設定姓名</span></div>
</div>

<div class="month-nav">
  <button class="navbtn" id="prevMonth">‹</button>
  <div class="label" id="monthLabel">7月<span class="yr">2026</span></div>
  <button class="navbtn" id="nextMonth">›</button>
</div>
<div class="weekrow"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
<div class="grid" id="grid"></div>
<div class="sync-note">輕觸日期新增或查看當日勤務・所有人看到的資料即時同步</div>

<button class="fab-add" id="fabAdd">＋</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="sheetDate">7月11日（六）</h2>
      <div class="close" id="closeSheet">✕</div>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<div class="name-modal" id="nameModal">
  <div class="name-box">
    <h3>你的姓名 / 代號</h3>
    <p>新增勤務時會顯示你的名字，方便同仁辨識登記者。</p>
    <input type="text" id="nameInput" placeholder="例如：江育忠">
    <button class="save" id="saveName">儲存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let current = new Date();
current.setDate(1);
let selectedDateStr = null;
let myName = "";
let dayPoll = null;

function pad(n){return n.toString().padStart(2,'0');}
function dstr(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function todayStr(){const t=new Date(); return dstr(t.getFullYear(), t.getMonth(), t.getDate());}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---------- Name (personal storage) ----------
async function loadName(){
  try{
    const r = await window.storage.get('myname', false);
    if(r && r.value){ myName = r.value; document.getElementById('nameChipText').textContent = myName; }
    else { document.getElementById('nameModal').classList.add('show'); }
  }catch(e){
    document.getElementById('nameModal').classList.add('show');
  }
}
document.getElementById('nameChip').onclick = ()=>{
  document.getElementById('nameInput').value = myName;
  document.getElementById('nameModal').classList.add('show');
};
document.getElementById('saveName').onclick = async ()=>{
  const v = document.getElementById('nameInput').value.trim();
  if(!v){ showToast('請輸入姓名'); return; }
  myName = v;
  document.getElementById('nameChipText').textContent = v;
  document.getElementById('nameModal').classList.remove('show');
  try{ await window.storage.set('myname', v, false); }catch(e){}
};

// ---------- Month rendering ----------
async function renderMonth(){
  const y = current.getFullYear(), m = current.getMonth();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').innerHTML = `${monthNames[m]}<span class="yr">${y}</span>`;

  const firstDow = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // find which days have entries this month
  let activeDays = new Set();
  try{
    const prefix = `entries:${y}-${pad(m+1)}`;
    const res = await window.storage.list(prefix, true);
    if(res && res.keys){
      res.keys.forEach(k=>{ const parts = k.split(':'); if(parts[1]) activeDays.add(parts[1]); });
    }
  }catch(e){}

  for(let i=0;i<firstDow;i++){
    const c = document.createElement('div'); c.className='cell empty'; grid.appendChild(c);
  }
  for(let d=1; d<=daysInMonth; d++){
    const ds = dstr(y,m,d);
    const dow = new Date(y,m,d).getDay();
    const c = document.createElement('div');
    c.className = 'cell' + (ds===todayStr() ? ' today':'') + ((dow===0||dow===6)?' weekend':'');
    c.innerHTML = `<div class="num">${d}</div>` + (activeDays.has(ds) ? '<div class="count-dot"></div>':'');
    c.onclick = ()=> openDay(ds);
    grid.appendChild(c);
  }
}

document.getElementById('prevMonth').onclick = ()=>{ current.setMonth(current.getMonth()-1); renderMonth(); };
document.getElementById('nextMonth').onclick = ()=>{ current.setMonth(current.getMonth()+1); renderMonth(); };
document.getElementById('fabAdd').onclick = ()=> openDay(todayStr());

// ---------- Day sheet ----------
function timeToMin(t){ const [h,mi] = t.split(':').map(Number); return h*60+mi; }
function fmtDateHeader(ds){
  const [y,m,d] = ds.split('-').map(Number);
  const wd = ['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];
  return `${m}月${d}日（${wd}）`;
}

async function openDay(ds){
  selectedDateStr = ds;
  document.getElementById('sheetDate').textContent = fmtDateHeader(ds);
  document.getElementById('overlay').classList.add('show');
  await refreshDay();
  clearInterval(dayPoll);
  dayPoll = setInterval(refreshDay, 4000);
}

document.getElementById('closeSheet').onclick = ()=>{
  document.getElementById('overlay').classList.remove('show');
  clearInterval(dayPoll);
  renderMonth();
};
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay'){ document.getElementById('closeSheet').click(); } };

async function fetchEntries(ds){
  try{
    const r = await window.storage.get(`entries:${ds}`, true);
    if(r && r.value) return JSON.parse(r.value);
    return [];
  }catch(e){ return []; }
}
async function saveEntries(ds, arr){
  await window.storage.set(`entries:${ds}`, JSON.stringify(arr), true);
}

async function refreshDay(){
  if(!selectedDateStr) return;
  const entries = await fetchEntries(selectedDateStr);
  entries.sort((a,b)=> timeToMin(a.start)-timeToMin(b.start));
  const body = document.getElementById('sheetBody');

  let html = '';
  // timeline
  html += `<div class="timeline" id="timeline">`;
  for(let h=0; h<=24; h+=6){ html += `<div class="tick" style="left:${(h/24)*100}%"></div>`; }
  entries.forEach(en=>{
    const s = timeToMin(en.start), e = timeToMin(en.end);
    const left = (s/1440)*100, width = Math.max(((e-s)/1440)*100, 0.6);
    html += `<div class="block" style="left:${left}%; width:${width}%;" title="${en.desc}"></div>`;
  });
  html += `</div><div class="hourlbl"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>`;

  if(entries.length===0){
    html += `<div class="empty-hint">當日尚無勤務登記</div>`;
  } else {
    entries.forEach(en=>{
      html += `<div class="entry">
        <div class="time">${en.start}–${en.end}</div>
        <div class="desc">${escapeHtml(en.desc)}<span class="who">${escapeHtml(en.name||'')}</span></div>
        <div class="del" data-id="${en.id}">🗑</div>
      </div>`;
    });
  }

  html += `<div class="add-form">
    <div class="row">
      <div class="col"><label>開始</label><input type="time" id="fStart" value="15:00"></div>
      <div class="col"><label>結束</label><input type="time" id="fEnd" value="17:00"></div>
    </div>
    <label>事項</label>
    <input type="text" id="fDesc" placeholder="例如：安檢、宣導、訓練">
    <button class="add-btn" id="addBtn">新增勤務</button>
  </div>`;

  body.innerHTML = html;

  body.querySelectorAll('.del').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-id');
      const cur = await fetchEntries(selectedDateStr);
      const next = cur.filter(x=>x.id!==id);
      await saveEntries(selectedDateStr, next);
      showToast('已刪除');
      refreshDay();
    };
  });

  document.getElementById('addBtn').onclick = async ()=>{
    const s = document.getElementById('fStart').value;
    const e = document.getElementById('fEnd').value;
    const desc = document.getElementById('fDesc').value.trim();
    if(!s || !e){ showToast('請選擇開始與結束時間'); return; }
    if(!desc){ showToast('請輸入事項'); return; }
    if(!myName){ document.getElementById('nameModal').classList.add('show'); return; }
    const cur = await fetchEntries(selectedDateStr);
    cur.push({ id: Date.now()+'-'+Math.random().toString(36).slice(2,7), start:s, end:e, desc, name:myName, ts:Date.now() });
    await saveEntries(selectedDateStr, cur);
    showToast('已新增');
    refreshDay();
  };
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- init ----------
(async function init(){
  await loadName();
  await renderMonth();
})();
</script>
</body>
</html>
