<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勤務行事曆</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --navy:#16233F;
    --navy-2:#223257;
    --amber:#E8A33D;
    --amber-dim:#F3D9A8;
    --paper:#F5F6F8;
    --card:#FFFFFF;
    --ink:#26313F;
    --ink-dim:#6B7686;
    --line:#E2E5EA;
    --red:#D6503F;
    --green:#3E8E64;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    display:flex; flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .topbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.5px;}
  .topbar .sub{font-size:11px; color:var(--amber-dim); margin-top:2px;}
  .name-chip{
    background:var(--navy-2);
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
    font-size:12px;
    padding:6px 10px;
    border-radius:20px;
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
  }
  .name-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}

  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 6px;
  }
  .month-nav .label{font-size:19px; font-weight:700; color:var(--navy);}
  .month-nav .label .yr{font-size:12px; color:var(--ink-dim); font-weight:500; display:block;}
  .navbtn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--line);
    background:#fff; color:var(--navy); font-size:16px; display:flex;
    align-items:center; justify-content:center;
  }
  .navbtn:active{background:var(--paper);}

  .weekrow{display:grid; grid-template-columns:repeat(7,1fr); padding:4px 12px 0; }
  .weekrow div{text-align:center; font-size:11px; color:var(--ink-dim); padding:4px 0;}

  .grid{
    display:grid; grid-template-columns:repeat(7,1fr);
    gap:6px; padding:6px 12px 14px;
  }
  .cell{
    min-height:60px;
    background:var(--card);
    border-radius:12px;
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start;
    padding:6px 2px 5px;
    position:relative;
    font-size:13px;
  }
  .cell.empty{background:transparent; border:none;}
  .cell .num{font-weight:600;}
  .cell.today{border:2px solid var(--amber);}
  .cell.today .num{color:var(--amber); }
  .cell.weekend .num{color:var(--red);}
  .cell .bar{
    margin-top:4px; width:100%; display:flex; flex-direction:column; gap:3px; align-items:center;
  }
  .cell .tag{
    font-size:10.5px; line-height:1.3; font-weight:700; color:#fff; border-radius:5px;
    padding:2px 3px; white-space:normal; word-break:break-word; text-align:center;
    width:94%;
  }
  .cell .more{font-size:10px; color:var(--ink-dim); font-weight:600;}
  .cell .count-dot{
    position:absolute; top:5px; right:6px; width:6px; height:6px; border-radius:50%;
    background:var(--amber);
  }

  /* Sheet */
  .overlay{
    position:fixed; inset:0; background:rgba(15,20,30,.45);
    display:none; align-items:flex-end; z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--paper);
    width:100%; max-height:88vh; border-radius:20px 20px 0 0;
    display:flex; flex-direction:column;
    animation:slideup .22s ease-out;
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{
    padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); background:var(--card); border-radius:20px 20px 0 0;
  }
  .sheet-head h2{font-size:16px; margin:0; color:var(--navy);}
  .sheet-head .close{font-size:20px; color:var(--ink-dim); padding:4px 8px;}
  .sheet-body{overflow-y:auto; padding:12px 16px 100px; flex:1;}

  .timeline{
    position:relative; margin:6px 0 18px; height:26px; background:var(--card);
    border-radius:8px; border:1px solid var(--line); overflow:hidden;
  }
  .timeline .tick{
    position:absolute; top:0; bottom:0; width:1px; background:var(--line);
  }
  .timeline .block{
    position:absolute; top:2px; bottom:2px; border-radius:5px;
    background:var(--amber); opacity:.85; min-width:2px;
  }
  .timeline .hourlbl{
    display:flex; justify-content:space-between; font-size:9px; color:var(--ink-dim); margin-top:2px;
  }

  .entry{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px;
    width:fit-content; max-width:100%; cursor:pointer; transition:border-color .15s, box-shadow .15s;
  }
  .entry:active{background:var(--paper);}
  .entry.editing{border-color:var(--amber); box-shadow:0 0 0 2px var(--amber-dim);}
  .entry .time{
    font-weight:700; color:var(--navy); font-size:16px;
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .entry .desc{font-size:17px; font-weight:600; white-space:nowrap;}
  .entry .who{font-size:13px; color:var(--navy-2); display:block; margin-top:3px; font-weight:600;}
  .entry .del{color:var(--red); font-size:20px; padding:4px 6px; margin-left:2px;}
  .edit-hint{
    text-align:center; color:var(--ink-dim); font-size:11px; margin:-2px 0 10px;
  }
  .empty-hint{
    text-align:center; color:var(--ink-dim); font-size:13px; padding:20px 0;
  }

  .add-form{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px; margin-top:6px;
  }
  .add-form .row{display:flex; gap:8px; margin-bottom:8px;}
  .add-form label{font-size:11px; color:var(--ink-dim); display:block; margin-bottom:3px;}
  .add-form input[type=time], .add-form input[type=text]{
    width:100%; padding:8px 9px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; background:var(--paper); color:var(--ink); font-family:inherit;
  }
  .add-form .col{flex:1;}
  .cat-btns{display:flex; gap:8px; margin-bottom:10px;}
  .cat-btn{
    flex:1; padding:11px 4px; border-radius:10px; border:2px solid var(--line);
    background:var(--paper); color:var(--ink); font-size:14px; font-weight:700;
    font-family:inherit;
  }
  .cat-btn.active{color:#fff; border-color:transparent;}
  .cat-btn[data-cat="安檢"].active{background:#2F6FA5;}
  .cat-btn[data-cat="宣導"].active{background:#3E8E64;}
  .cat-btn[data-cat="其他"].active{background:#D6503F;}
  .add-btn{
    width:100%; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:11px; font-size:14px; font-weight:700; margin-top:4px;
  }
  .add-btn:active{background:var(--navy-2);}
  .cancel-edit-btn{
    width:100%; background:var(--paper); color:var(--navy); border:1px solid var(--line);
    border-radius:10px; padding:9px; font-size:13px; font-weight:600; margin-top:8px;
  }

  .fab-add{
    position:fixed; bottom:20px; right:20px; width:54px; height:54px; border-radius:50%;
    background:var(--amber); color:var(--navy); font-size:26px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.25); z-index:15; border:none;
  }
  .sync-note{
    text-align:center; font-size:10px; color:var(--ink-dim); padding:2px 0 10px;
  }
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:8px 16px; border-radius:20px;
    font-size:12px; z-index:99; opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .name-modal{
    position:fixed; inset:0; background:rgba(15,20,30,.5); display:none;
    align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .name-modal.show{display:flex;}
  .name-box{
    background:#fff; border-radius:16px; padding:20px; width:100%; max-width:320px;
  }
  .name-box h3{margin:0 0 4px; font-size:15px; color:var(--navy);}
  .name-box p{margin:0 0 12px; font-size:12px; color:var(--ink-dim);}
  .name-box input{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    font-size:14px; margin-bottom:12px; font-family:inherit;
  }
  .name-box .save{
    width:100%; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:11px; font-size:14px; font-weight:700;
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>勤務行事曆</h1>
  </div>
  <div class="name-chip" id="nameChip"><span class="dot"></span><span id="nameChipText">設定姓名</span></div>
</div>

<div class="month-nav">
  <button class="navbtn" id="prevMonth">‹</button>
  <div class="label" id="monthLabel">7月<span class="yr">2026</span></div>
  <button class="navbtn" id="nextMonth">›</button>
</div>
<div class="weekrow"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
<div class="grid" id="grid"></div>
<div class="sync-note">輕觸日期新增或查看當日勤務・使用 Firebase 即時同步</div>

<button class="fab-add" id="fabAdd">＋</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="sheetDate">7月11日（六）</h2>
      <div class="close" id="closeSheet">✕</div>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<div class="name-modal" id="nameModal">
  <div class="name-box">
    <h3>你的姓名 / 代號</h3>
    <p>新增勤務時會顯示你的名字，方便同仁辨識登記者。</p>
    <input type="text" id="nameInput" placeholder="例如：江育忠">
    <button class="save" id="saveName">儲存</button>
  </div>
</div>

<div class="name-modal" id="confirmModal">
  <div class="name-box">
    <h3>確定要刪除嗎？</h3>
    <p id="confirmText" style="margin-bottom:16px;"></p>
    <div style="display:flex; gap:10px;">
      <button id="confirmNo" style="flex:1; background:var(--paper); color:var(--navy); border:1px solid var(--line); border-radius:10px; padding:11px; font-size:14px; font-weight:700;">取消</button>
      <button id="confirmYes" style="flex:1; background:var(--red); color:#fff; border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:700;">確定刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====== 請把下面換成你自己 Firebase 專案「網頁應用程式」的設定值 ======
   注意：Realtime Database 一定要有 databaseURL 這個欄位！
   如果專案設定頁給你的設定值裡沒有 databaseURL，
   就去 Realtime Database 的「資料」分頁最上面複製那個網址
   （長得像 https://xxxx-default-rtdb.asia-southeast1.firebasedatabase.app）貼進來。
*/
const firebaseConfig = {
  apiKey: "AIzaSyDcw0jQkqdjZXgyE4mFKtFwzxrKXDsyZkc",
  authDomain: "calendar-d8ff0.firebaseapp.com",
  databaseURL: "https://calendar-d8ff0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "calendar-d8ff0",
  storageBucket: "calendar-d8ff0.firebasestorage.app",
  messagingSenderId: "769782915206",
  appId: "1:769782915206:web:83466b3d4728a691b73107"
};
/* ================================================================= */

let db = null;
let firebaseReady = false;
try{
  if(firebaseConfig.apiKey !== "YOUR_API_KEY"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    firebaseReady = true;
  }
}catch(e){ console.error('Firebase 初始化失敗', e); }

let current = new Date();
current.setDate(1);
let selectedDateStr = null;
let myName = "";
let dayRef = null; // 目前正在監聽的 Realtime Database 參照
let editingId = null; // 目前正在編輯的勤務 id（null 代表新增模式）
let selectedCategory = ''; // 目前表單選取的分類

const catColors = { '安檢':'#2F6FA5', '宣導':'#3E8E64', '其他':'#D6503F' };
function catColor(cat){ return catColors[cat] || 'var(--navy-2)'; }
function composeDesc(en){
  if(en.category){ return en.detail ? `${en.category}－${en.detail}` : en.category; }
  return en.desc || '';
}

function pad(n){return n.toString().padStart(2,'0');}
function dstr(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function todayStr(){const t=new Date(); return dstr(t.getFullYear(), t.getMonth(), t.getDate());}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function checkFirebaseReady(){
  if(!firebaseReady){
    showToast('尚未設定 Firebase，請先完成設定');
    return false;
  }
  return true;
}

function showConfirm(msg){
  return new Promise(resolve=>{
    document.getElementById('confirmText').textContent = msg;
    const modal = document.getElementById('confirmModal');
    const yes = document.getElementById('confirmYes');
    const no = document.getElementById('confirmNo');
    modal.classList.add('show');
    function cleanup(result){
      modal.classList.remove('show');
      yes.onclick = null; no.onclick = null;
      resolve(result);
    }
    yes.onclick = ()=> cleanup(true);
    no.onclick = ()=> cleanup(false);
  });
}

// ---------- Name（存在這台裝置的瀏覽器裡，不需登入系統） ----------
function loadName(){
  const v = localStorage.getItem('myname');
  if(v){ myName = v; document.getElementById('nameChipText').textContent = myName; }
  else { document.getElementById('nameModal').classList.add('show'); }
}
document.getElementById('nameChip').onclick = ()=>{
  document.getElementById('nameInput').value = myName;
  document.getElementById('nameModal').classList.add('show');
};
document.getElementById('saveName').onclick = ()=>{
  const v = document.getElementById('nameInput').value.trim();
  if(!v){ showToast('請輸入姓名'); return; }
  myName = v;
  document.getElementById('nameChipText').textContent = v;
  document.getElementById('nameModal').classList.remove('show');
  localStorage.setItem('myname', v);
};

// ---------- Month rendering ----------
async function renderMonth(){
  const y = current.getFullYear(), m = current.getMonth();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').innerHTML = `${monthNames[m]}<span class="yr">${y}</span>`;

  const firstDow = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // 抓取本月每一天的完整勤務資料，用於在格子上顯示時間＋分類
  let dayEntries = {};
  if(firebaseReady){
    try{
      const start = dstr(y,m,1);
      const end = dstr(y,m,daysInMonth);
      const snap = await db.ref('days').orderByKey().startAt(start).endAt(end).once('value');
      snap.forEach(child=>{
        const val = child.val() || {};
        const list = Object.keys(val).map(id=>({id, ...val[id]}));
        if(list.length){
          list.sort((a,b)=> timeToMin(a.start)-timeToMin(b.start));
          dayEntries[child.key] = list;
        }
      });
    }catch(e){ console.error(e); }
  }

  for(let i=0;i<firstDow;i++){
    const c = document.createElement('div'); c.className='cell empty'; grid.appendChild(c);
  }
  const MAX_SHOW = 3;
  for(let d=1; d<=daysInMonth; d++){
    const ds = dstr(y,m,d);
    const dow = new Date(y,m,d).getDay();
    const c = document.createElement('div');
    c.className = 'cell' + (ds===todayStr() ? ' today':'') + ((dow===0||dow===6)?' weekend':'');
    const list = dayEntries[ds];
    let barHtml = '';
    if(list && list.length){
      let tags = list.slice(0,MAX_SHOW).map(en=>{
        const label = escapeHtml(en.category || en.desc || '');
        return `<div class="tag" style="background:${catColor(en.category)}">${en.start}-${en.end}${label}</div>`;
      }).join('');
      if(list.length > MAX_SHOW){
        tags += `<div class="more">+${list.length-MAX_SHOW}項</div>`;
      }
      barHtml = `<div class="bar">${tags}</div>`;
    }
    c.innerHTML = `<div class="num">${d}</div>${barHtml}`;
    c.onclick = ()=> openDay(ds);
    grid.appendChild(c);
  }
}

document.getElementById('prevMonth').onclick = ()=>{ current.setMonth(current.getMonth()-1); renderMonth(); };
document.getElementById('nextMonth').onclick = ()=>{ current.setMonth(current.getMonth()+1); renderMonth(); };
document.getElementById('fabAdd').onclick = ()=> openDay(todayStr());

// ---------- Day sheet ----------
function timeToMin(t){ const [h,mi] = t.split(':').map(Number); return h*60+mi; }
function fmtDateHeader(ds){
  const [y,m,d] = ds.split('-').map(Number);
  const wd = ['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];
  return `${m}月${d}日（${wd}）`;
}

function isEditingForm(){
  const active = document.activeElement;
  if(!active) return false;
  return active.id==='fDetail' || active.id==='fStart' || active.id==='fEnd';
}

async function openDay(ds){
  if(!checkFirebaseReady()) return;
  selectedDateStr = ds;
  editingId = null;
  document.getElementById('sheetDate').textContent = fmtDateHeader(ds);
  document.getElementById('overlay').classList.add('show');

  const body = document.getElementById('sheetBody');
  body.innerHTML = `<div id="entriesArea"></div>
    <div class="edit-hint">輕觸上方任一筆勤務可修改時間或事項</div>
    <div class="add-form">
      <div class="row">
        <div class="col"><label>開始</label><input type="time" id="fStart" value="15:00"></div>
        <div class="col"><label>結束</label><input type="time" id="fEnd" value="17:00"></div>
      </div>
      <label>分類</label>
      <div class="cat-btns">
        <button type="button" class="cat-btn" data-cat="安檢">安檢</button>
        <button type="button" class="cat-btn" data-cat="宣導">宣導</button>
        <button type="button" class="cat-btn" data-cat="其他">其他</button>
      </div>
      <label>細項（選填）</label>
      <input type="text" id="fDetail" placeholder="例如：東側大門、消防設備檢查">
      <button class="add-btn" id="addBtn">新增勤務</button>
      <button class="cancel-edit-btn" id="cancelEditBtn" style="display:none;">取消編輯</button>
    </div>`;

  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.onclick = ()=>{
      selectedCategory = btn.getAttribute('data-cat');
      document.querySelectorAll('.cat-btn').forEach(b=> b.classList.toggle('active', b===btn));
    };
  });

  function resetFormToAddMode(){
    editingId = null;
    selectedCategory = '';
    document.getElementById('addBtn').textContent = '新增勤務';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('fStart').value = '15:00';
    document.getElementById('fEnd').value = '17:00';
    document.getElementById('fDetail').value = '';
    document.querySelectorAll('.cat-btn').forEach(b=> b.classList.remove('active'));
    document.querySelectorAll('.entry').forEach(el=> el.classList.remove('editing'));
  }

  document.getElementById('cancelEditBtn').onclick = resetFormToAddMode;

  document.getElementById('addBtn').onclick = async ()=>{
    const s = document.getElementById('fStart').value;
    const e = document.getElementById('fEnd').value;
    const detail = document.getElementById('fDetail').value.trim();
    if(!s || !e){ showToast('請選擇開始與結束時間'); return; }
    if(!selectedCategory){ showToast('請選擇分類（安檢／宣導／其他）'); return; }
    if(!myName){ document.getElementById('nameModal').classList.add('show'); return; }
    try{
      if(editingId){
        await db.ref(`days/${selectedDateStr}/${editingId}`).update({ start:s, end:e, category:selectedCategory, detail });
        showToast('已更新');
        resetFormToAddMode();
      } else {
        const id = Date.now()+'-'+Math.random().toString(36).slice(2,7);
        await db.ref(`days/${selectedDateStr}/${id}`).set({ start:s, end:e, category:selectedCategory, detail, name:myName, ts:Date.now() });
        document.getElementById('fDetail').value = '';
        showToast('已新增');
      }
    }catch(err){ console.error(err); showToast('操作失敗，請檢查網路'); }
  };

  // 取消上一個監聽，改監聽新的日期
  if(dayRef) dayRef.off();
  dayRef = db.ref(`days/${ds}`);
  dayRef.on('value', snap=>{
    const val = snap.val() || {};
    const entries = Object.keys(val).map(id => ({ id, ...val[id] }));
    renderEntries(entries);
  }, err=>{ console.error(err); });
}

document.getElementById('closeSheet').onclick = ()=>{
  document.getElementById('overlay').classList.remove('show');
  if(dayRef){ dayRef.off(); dayRef = null; }
  selectedDateStr = null;
  editingId = null;
  renderMonth();
};
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay'){ document.getElementById('closeSheet').click(); } };

function renderEntries(entries){
  const area = document.getElementById('entriesArea');
  if(!area) return;
  // 使用者正在打字/選時間時，先不要重繪，避免鍵盤被打斷
  if(isEditingForm()) return;

  const sorted = [...entries].sort((a,b)=> timeToMin(a.start)-timeToMin(b.start));

  let html = '';
  html += `<div class="timeline" id="timeline">`;
  for(let h=0; h<=24; h+=6){ html += `<div class="tick" style="left:${(h/24)*100}%"></div>`; }
  sorted.forEach(en=>{
    const s = timeToMin(en.start), e = timeToMin(en.end);
    const left = (s/1440)*100, width = Math.max(((e-s)/1440)*100, 0.6);
    html += `<div class="block" style="left:${left}%; width:${width}%; background:${catColor(en.category)};" title="${escapeHtml(composeDesc(en))}"></div>`;
  });
  html += `</div><div class="hourlbl"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>`;

  if(sorted.length===0){
    html += `<div class="empty-hint">當日尚無勤務登記</div>`;
  } else {
    sorted.forEach(en=>{
      html += `<div class="entry${en.id===editingId?' editing':''}" data-id="${en.id}">
        <div class="time">${en.start}–${en.end}</div>
        <div class="desc">${escapeHtml(composeDesc(en))}<span class="who">${escapeHtml(en.name||'')}新增</span></div>
        <div class="del" data-id="${en.id}">🗑</div>
      </div>`;
    });
  }

  area.innerHTML = html;

  // 點擊整筆勤務（非垃圾桶）進入編輯模式
  area.querySelectorAll('.entry').forEach(row=>{
    row.addEventListener('click', (e)=>{
      if(e.target.closest('.del')) return;
      const id = row.getAttribute('data-id');
      const en = sorted.find(x=>x.id===id);
      if(!en) return;
      editingId = id;
      document.getElementById('fStart').value = en.start;
      document.getElementById('fEnd').value = en.end;
      selectedCategory = en.category || '';
      document.querySelectorAll('.cat-btn').forEach(b=> b.classList.toggle('active', b.getAttribute('data-cat')===selectedCategory));
      document.getElementById('fDetail').value = en.detail || (en.category ? '' : (en.desc || ''));
      document.getElementById('addBtn').textContent = '更新勤務';
      document.getElementById('cancelEditBtn').style.display = 'block';
      area.querySelectorAll('.entry').forEach(el=> el.classList.toggle('editing', el.getAttribute('data-id')===id));
      document.getElementById('fDetail').focus();
    });
  });

  area.querySelectorAll('.del').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const en = sorted.find(x=>x.id===id);
      const label = en ? `${en.start}–${en.end}　${composeDesc(en)}` : '這筆勤務';
      const ok = await showConfirm(`確定要刪除「${label}」嗎？此動作無法復原。`);
      if(!ok) return;
      try{
        await db.ref(`days/${selectedDateStr}/${id}`).remove();
        if(editingId === id){
          editingId = null;
          document.getElementById('addBtn').textContent = '新增勤務';
          document.getElementById('cancelEditBtn').style.display = 'none';
        }
        showToast('已刪除');
      }catch(err){ console.error(err); showToast('刪除失敗，請檢查網路'); }
    };
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- init ----------
(function init(){
  loadName();
  if(!firebaseReady){
    showToast('尚未設定 Firebase，請完成設定後重新整理');
  }
  renderMonth();
})();
</script>
